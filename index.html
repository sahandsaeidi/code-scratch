<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>Scratch UI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">

  <div class="block h1" draggable="true" ondragstart="drag(event)" data-code="<h1>سلام</h1>">
    H1
  </div>

  <div class="block p" draggable="true" ondragstart="drag(event)" data-code="<p>متن</p>">
    P
  </div>

  <div class="block button" draggable="true" ondragstart="drag(event)" data-code="<button>کلیک</button>">
    Button
  </div>

</div>

<div class="workspace" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<div class="preview">
  <button onclick="run()">Run</button>
  <iframe id="frame"></iframe>
</div>

<script src="js/app.js"></script>
<script src="js/registry.js"></script>

</body>
</html>
